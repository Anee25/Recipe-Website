<html>
<head>
	<title>Login - FlavorNest</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script type="text/javascript" src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<style>
.section{
  display:none;
}

body{
    background-image: url("34.jpg");         
    background-size:cover;                 
    background-position: center;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    width:300px;
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}
</style>
<script>
function validation(){
let user=document.getElementById("username").value;
let pwd=document.getElementById("password").value;
if(user===""||pwd===""){
  alert("All field required,Please fill it!");
  return false;
}
localStorage.setItem("user", user);
alert("Login Successfull...")
return true;
}

$(document).ready(function(){
  $(".section").slideDown(1000);
});
</script>
</head>

<body>
<form action="index.html" onsubmit="return validation()">
<div class="section">
<div class="login-box">

    <h3>🍽️ FlavorNest Login</h3>

    <input type="text" id="username" placeholder="👤 Username">
    <input type="password" id="password" placeholder="🔑 Password">

    <button id="loginBtn" class="btn btn-success w-100">Login</button>

    <p id="msg" style="margin-top:10px;"></p>
    <div class="footer">Made with ❤️ for food lovers</div>
</div>
</div>
</form>
</body>
</html>
